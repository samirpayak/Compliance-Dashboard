  overdue:{label:"Overdue",color:"#EF4444",bg:"#FEF2F2"},
};

const STORE_KEY = "sebi-compliance-dash-v1";

function loadStore() {
  try { const d = localStorage.getItem(STORE_KEY); return d ? JSON.parse(d) : null; }
  catch { return null; }
}
function saveStore(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) { console.error(e); }
}

/* ─────────────── APP ─────────────── */
function App() {
  const [role, setRole] = useState(null);
  const [loginName, setLoginName] = useState("");
  const [tasks, setTasks] = useState(DEFAULT_TASKS);
  const [statuses, setStatuses] = useState({});
  const [activityLog, setActivityLog] = useState([]);
  const [selectedCat, setSelectedCat] = useState("All");
  const [statusFilter, setStatusFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showAddModal, setShowAddModal] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(null);
  const [showLog, setShowLog] = useState(false);
  const [newTask, setNewTask] = useState({category:"PMS",task:"",due:""});
  const month = "April 2026";

  useEffect(() => {
    const d = loadStore();
    if (d) {
      setTasks(d.tasks || DEFAULT_TASKS);
      setStatuses(d.statuses || {});
      setActivityLog(d.activityLog || []);
    }
  }, []);

  const persist = (t, s, l) => {
    saveStore({ tasks: t||tasks, statuses: s||statuses, activityLog: l||activityLog });
  };

  const updateStatus = (taskId, status) => {
    const ns = {...statuses, [taskId]: {status, updatedBy: loginName, updatedAt: new Date().toISOString()}};
    const tObj = tasks.find(t=>t.id===taskId);
    const nl = [{taskId, taskName: (tObj?.task||"").substring(0,60)+"...", status, by: loginName, at: new Date().toISOString()}, ...activityLog].slice(0,200);
    setStatuses(ns); setActivityLog(nl); persist(null, ns, nl);
  };

  const addTask = () => {
    if (!newTask.task.trim() || !newTask.due.trim()) return;
    const id = "custom-"+Date.now();
    const nt = [...tasks, {id, category: newTask.category, task: newTask.task, due: newTask.due, type:"custom"}];
    const nl = [{taskId:id, taskName:"Added: "+newTask.task.substring(0,50), status:"added", by:loginName, at:new Date().toISOString()}, ...activityLog];
    setTasks(nt); setActivityLog(nl); setNewTask({category:"PMS",task:"",due:""}); setShowAddModal(false);
    persist(nt, null, nl);
  };

  const deleteTask = (taskId) => {
    const tObj = tasks.find(t=>t.id===taskId);
    const nt = tasks.filter(t=>t.id!==taskId);
    const ns = {...statuses}; delete ns[taskId];
    const nl = [{taskId, taskName:"Removed: "+(tObj?.task||"").substring(0,50), status:"removed", by:loginName, at:new Date().toISOString()}, ...activityLog];
    setTasks(nt); setStatuses(ns); setActivityLog(nl); setShowDeleteConfirm(null);
    persist(nt, ns, nl);
  };

  const resetAll = () => {
    if (!confirm("Reset ALL tasks to defaults and clear all status updates?")) return;
    setTasks(DEFAULT_TASKS); setStatuses({}); setActivityLog([]);
    persist(DEFAULT_TASKS, {}, []);
  };

  const filtered = useMemo(() => tasks.filter(t => {
    if (selectedCat !== "All" && t.category !== selectedCat) return false;
    if (search && !t.task.toLowerCase().includes(search.toLowerCase()) && !t.due.toLowerCase().includes(search.toLowerCase())) return false;
    const s = statuses[t.id]?.status || "pending";
    if (statusFilter !== "all" && s !== statusFilter) return false;
    return true;
  }), [tasks, selectedCat, search, statusFilter, statuses]);

  const stats = useMemo(() => {
    const total = tasks.length;
    const done = tasks.filter(t=>statuses[t.id]?.status==="done").length;
    const inp = tasks.filter(t=>statuses[t.id]?.status==="in_progress").length;
    const ovr = tasks.filter(t=>statuses[t.id]?.status==="overdue").length;
    return {total, done, inProgress:inp, overdue:ovr, pending: total-done-inp-ovr};
  }, [tasks, statuses]);

  const catStats = useCallback((cat) => {
    const ct = tasks.filter(t=>t.category===cat);
    return {total:ct.length, done:ct.filter(t=>statuses[t.id]?.status==="done").length};
  }, [tasks, statuses]);

  const pct = stats.total > 0 ? Math.round((stats.done/stats.total)*100) : 0;
  const isAdmin = role === "admin";

  /* ── LOGIN SCREEN ── */
  if (!role) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E293B 50%,#0F172A 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="slide-up" style={{maxWidth:520,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:13,letterSpacing:4,color:"#64748B",fontFamily:"'Space Mono',monospace",marginBottom:12,textTransform:"uppercase"}}>SEBI Compliance Management</div>
        <h1 style={{fontSize:42,fontWeight:700,color:"#F8FAFC",margin:"0 0 8px",lineHeight:1.1}}>Compliance<br/>Dashboard</h1>
        <p style={{color:"#94A3B8",fontSize:15,margin:"0 0 40px"}}>{month} — All Entity Categories</p>
        <div style={{marginBottom:24}}>
          <input placeholder="Enter your name" value={loginName} onChange={e=>setLoginName(e.target.value)}
            onKeyDown={e=>e.key==="Enter" && loginName.trim() && setRole("team")}
            style={{width:"100%",boxSizing:"border-box",padding:"14px 20px",borderRadius:12,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:15,outline:"none"}}/>
        </div>
        <div style={{display:"flex",gap:16,justifyContent:"center"}}>
          {[{r:"admin",label:"Admin",desc:"Manage tasks & view status",icon:"⚙️"},{r:"team",label:"Team Member",desc:"Update task status",icon:"👤"}].map(({r,label,desc,icon})=>(
            <button key={r} onClick={()=>loginName.trim()&&setRole(r)} disabled={!loginName.trim()}
              style={{flex:1,padding:"28px 20px",borderRadius:16,border:"1px solid #334155",background:loginName.trim()?"#1E293B":"#0F172A",color:"#F8FAFC",cursor:loginName.trim()?"pointer":"not-allowed",transition:"all 0.2s",opacity:loginName.trim()?1:0.4}}>
              <div style={{fontSize:32,marginBottom:12}}>{icon}</div>
              <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{label}</div>
              <div style={{fontSize:12,color:"#64748B"}}>{desc}</div>
            </button>
          ))}
        </div>
        <p style={{color:"#334155",fontSize:11,marginTop:32}}>Data saved in your browser (localStorage). Share this HTML file across your team.</p>
      </div>
    </div>
  );

  /* ── MAIN DASHBOARD ── */
  return (
    <div style={{minHeight:"100vh",background:"#0F172A"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#1E293B 0%,#0F172A 100%)",borderBottom:"1px solid #1E293B",padding:"14px 24px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <span style={{fontSize:11,letterSpacing:3,color:"#64748B",fontFamily:"'Space Mono',monospace",textTransform:"uppercase"}}>SEBI COMPLIANCE</span>
            <h1 style={{fontSize:20,fontWeight:700,margin:0,color:"#F8FAFC"}}>{month}</h1>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,background:isAdmin?"#312E81":"#1E3A5F",color:isAdmin?"#A5B4FC":"#7DD3FC",border:"1px solid "+(isAdmin?"#4338CA":"#0369A1")}}>{isAdmin?"ADMIN":"TEAM"}: {loginName}</span>
            {isAdmin && <button onClick={()=>setShowLog(!showLog)} style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,background:"#1E293B",color:"#94A3B8",border:"1px solid #334155",cursor:"pointer"}}>📜 Activity Log</button>}
            <button onClick={()=>{setRole(null);setLoginName("");}} style={{padding:"5px 12px",borderRadius:20,fontSize:11,background:"transparent",color:"#64748B",border:"1px solid #334155",cursor:"pointer"}}>Logout</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"20px 24px 60px"}}>
        {/* STATS */}
        <div className="fade-in" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(130px, 1fr))",gap:10,marginBottom:20}}>
          {[{l:"Total",v:stats.total,c:"#6366F1",b:"#1E1B4B"},{l:"Done",v:stats.done,c:"#22C55E",b:"#052E16"},{l:"In Progress",v:stats.inProgress,c:"#F59E0B",b:"#422006"},{l:"Pending",v:stats.pending,c:"#94A3B8",b:"#1E293B"},{l:"Overdue",v:stats.overdue,c:"#EF4444",b:"#450A0A"}].map(s=>(
            <div key={s.l} style={{background:s.b,borderRadius:14,padding:"14px 16px",border:"1px solid "+s.c+"22"}}>
              <div style={{fontSize:26,fontWeight:700,color:s.c,fontFamily:"'Space Mono',monospace"}}>{s.v}</div>
              <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>

        {/* PROGRESS BAR */}
        <div style={{background:"#1E293B",borderRadius:12,padding:14,marginBottom:20,border:"1px solid #334155"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,color:"#94A3B8"}}>Overall Progress</span>
            <span style={{fontSize:12,fontWeight:700,color:"#22C55E",fontFamily:"'Space Mono',monospace"}}>{pct}%</span>
          </div>
          <div style={{height:7,background:"#0F172A",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#22C55E,#4ADE80)",borderRadius:4,transition:"width 0.5s"}}/>
          </div>
        </div>

        {/* CATEGORY PILLS */}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
          <button onClick={()=>setSelectedCat("All")} style={{padding:"7px 14px",borderRadius:8,fontSize:11,fontWeight:600,background:selectedCat==="All"?"#33415544":"#1E293B",color:selectedCat==="All"?"#F8FAFC":"#94A3B8",border:"1px solid "+(selectedCat==="All"?"#64748B":"#334155"),cursor:"pointer"}}>All ({tasks.length})</button>
          {CATEGORIES.map(cat=>{const cs=catStats(cat); const p=cs.total>0?Math.round((cs.done/cs.total)*100):0; const cc=CAT_COLORS[cat]; return(
            <button key={cat} onClick={()=>setSelectedCat(selectedCat===cat?"All":cat)} style={{padding:"7px 12px",borderRadius:8,fontSize:11,fontWeight:600,background:selectedCat===cat?cc.badge+"22":"#1E293B",color:selectedCat===cat?cc.badge:"#94A3B8",border:"1px solid "+(selectedCat===cat?cc.badge:"#334155"),cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
              {cat} <span style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:p===100?"#052E16":"#0F172A",color:p===100?"#22C55E":"#64748B"}}>{cs.done}/{cs.total}</span>
            </button>);
          })}
        </div>

        {/* FILTERS */}
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder="🔍  Search tasks..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:180,padding:"9px 14px",borderRadius:10,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:13,outline:"none"}}/>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:13,outline:"none",cursor:"pointer"}}>
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
            <option value="overdue">Overdue</option>
          </select>
          {isAdmin && <button onClick={()=>setShowAddModal(true)} style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#6366F1",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>+ Add Task</button>}
          {isAdmin && <button onClick={resetAll} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #7F1D1D",background:"#450A0A",color:"#FCA5A5",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>Reset All</button>}
        </div>

        {/* ACTIVITY LOG */}
        {showLog && isAdmin && (
          <div className="fade-in" style={{background:"#1E293B",borderRadius:14,padding:18,marginBottom:20,border:"1px solid #334155",maxHeight:280,overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:700}}>📜 Activity Log</h3>
              <button onClick={()=>setShowLog(false)} style={{background:"none",border:"none",color:"#64748B",cursor:"pointer",fontSize:16}}>✕</button>
            </div>
            {activityLog.length===0 ? <p style={{color:"#64748B",fontSize:12,margin:0}}>No activity yet.</p> :
              activityLog.slice(0,50).map((log,i)=>(
                <div key={i} style={{padding:"6px 0",borderBottom:"1px solid #334155",fontSize:11}}>
                  <span style={{color:"#94A3B8"}}>{new Date(log.at).toLocaleString()}</span>{" "}
                  <span style={{color:"#F8FAFC",fontWeight:600}}>{log.by}</span>{" "}
                  <span style={{color:STATUS_CFG[log.status]?.color||"#94A3B8"}}>{log.status==="added"?"➕ added":log.status==="removed"?"🗑️ removed":"→ "+STATUS_CFG[log.status]?.label}</span>{" "}
                  <span style={{color:"#64748B"}}>{log.taskName}</span>
                </div>
              ))
            }
          </div>
        )}

        {/* TASK LIST */}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {filtered.length===0 ? (
            <div style={{textAlign:"center",padding:60,color:"#64748B"}}>
              <div style={{fontSize:40,marginBottom:12}}>📋</div>
              <div>No tasks match your filters</div>
            </div>
          ) : filtered.map((t,idx)=>{
            const s = statuses[t.id]?.status || "pending";
            const sc = STATUS_CFG[s];
            const cc = CAT_COLORS[t.category];
            return (
              <div key={t.id} className="task-row" style={{background:"#1E293B11",borderRadius:10,padding:"12px 16px",border:"1px solid "+(s==="done"?"#22C55E22":"#334155"),display:"flex",alignItems:"center",gap:12,transition:"all 0.15s",opacity:s==="done"?0.65:1,animationDelay:idx*15+"ms",cursor:"default"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:sc.color,flexShrink:0,boxShadow:s==="overdue"?"0 0 8px #EF444488":"none"}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                    <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:cc.badge+"18",color:cc.badge,letterSpacing:.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>{t.category}</span>
                    <span style={{fontSize:10,fontWeight:600,color:"#CBD5E1",fontFamily:"'Space Mono',monospace",whiteSpace:"nowrap"}}>Due: {t.due}</span>
                    {t.type==="custom" && <span style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:"#312E81",color:"#A5B4FC"}}>CUSTOM</span>}
                  </div>
                  <div style={{fontSize:12.5,color:s==="done"?"#64748B":"#E2E8F0",textDecoration:s==="done"?"line-through":"none",lineHeight:1.4}}>{t.task}</div>
                  {statuses[t.id]?.updatedBy && <div style={{fontSize:10,color:"#475569",marginTop:3}}>Updated by <strong>{statuses[t.id].updatedBy}</strong> • {new Date(statuses[t.id].updatedAt).toLocaleString()}</div>}
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  {Object.entries(STATUS_CFG).map(([key,val])=>(
                    <button key={key} className="btn-status" onClick={()=>updateStatus(t.id,key)} style={{padding:"4px 9px",borderRadius:5,fontSize:10,fontWeight:600,background:s===key?val.color+"22":"transparent",color:s===key?val.color:"#475569",border:"1px solid "+(s===key?val.color:"#33415566"),cursor:"pointer",transition:"all 0.12s",whiteSpace:"nowrap"}}>{val.label}</button>
                  ))}
                  {isAdmin && <button onClick={()=>setShowDeleteConfirm(t.id)} style={{padding:"4px 7px",borderRadius:5,fontSize:10,background:"transparent",color:"#7F1D1D",border:"1px solid #7F1D1D44",cursor:"pointer"}} title="Remove task">✕</button>}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{textAlign:"center",padding:"20px 0",color:"#334155",fontSize:11}}>Showing {filtered.length} of {tasks.length} tasks</div>
      </div>

      {/* ADD TASK MODAL */}
      {showAddModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAddModal(false)} style={{position:"fixed",inset:0,background:"#000000aa",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div className="slide-up" style={{background:"#1E293B",borderRadius:20,padding:28,maxWidth:480,width:"100%",border:"1px solid #334155"}}>
            <h2 style={{margin:"0 0 20px",fontSize:19,fontWeight:700}}>Add New Task</h2>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:5}}>Category</label>
              <select value={newTask.category} onChange={e=>setNewTask({...newTask,category:e.target.value})} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13}}>
                {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:5}}>Task Description</label>
              <textarea value={newTask.task} onChange={e=>setNewTask({...newTask,task:e.target.value})} rows={3} placeholder="Enter compliance task description..." style={{width:"100%",padding:"9px 12px",borderRadius:10,boxSizing:"border-box",border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13,resize:"vertical",fontFamily:"'DM Sans',sans-serif"}}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:5}}>Due Date</label>
              <input value={newTask.due} onChange={e=>setNewTask({...newTask,due:e.target.value})} placeholder="e.g. 30.04.2026" style={{width:"100%",padding:"9px 12px",borderRadius:10,boxSizing:"border-box",border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13}}/>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowAddModal(false)} style={{padding:"9px 18px",borderRadius:10,border:"1px solid #334155",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:13}}>Cancel</button>
              <button onClick={addTask} style={{padding:"9px 22px",borderRadius:10,border:"none",background:"#6366F1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Add Task</button>
            </div>
          </div>
        </div>
      )}

      {/* DELETE CONFIRM */}
      {showDeleteConfirm && (
        <div className="modal-overlay" style={{position:"fixed",inset:0,background:"#000000aa",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div className="slide-up" style={{background:"#1E293B",borderRadius:16,padding:24,maxWidth:400,width:"100%",border:"1px solid #7F1D1D44"}}>
            <h3 style={{margin:"0 0 10px",fontSize:16,color:"#FCA5A5"}}>Remove Task?</h3>
            <p style={{fontSize:12,color:"#94A3B8",margin:"0 0 18px",lineHeight:1.5}}>{tasks.find(t=>t.id===showDeleteConfirm)?.task}</p>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowDeleteConfirm(null)} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #334155",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:12}}>Cancel</button>
              <button onClick={()=>deleteTask(showDeleteConfirm)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#DC2626",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600}}>Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
