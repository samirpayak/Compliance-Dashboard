function loadStore() {
  try { const d = localStorage.getItem(STORE_KEY); return d ? JSON.parse(d) : null; }
  catch { return null; }
}
function saveStore(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) { console.error(e); }
}

// Simple password hash function (client-side)
function hashPassword(pwd) {
  let hash = 0;
  for (let i = 0; i < pwd.length; i++) {
    const char = pwd.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash; // Convert to 32bit integer
  }
  return Math.abs(hash).toString(16);
}

// Assign default tasks to all users for initial setup
function initializeTasksWithOwners(tasks, currentUser) {
  return tasks.map(t => ({...t, assignedTo: t.assignedTo || "all"})); // "all" = visible to all
}

            <div style={{fontSize:10,color:"#FCA5A5",lineHeight:1.5}}>Only authorized administrators can access the dashboard management features. Enter the admin password to continue.</div>
          </div>
          
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:6}}>Admin Password</label>

          </div>

          {loginError && <div style={{background:"#450A0A",color:"#FCA5A5",padding:10,borderRadius:8,fontSize:11,marginBottom:14,border:"1px solid #7F1D1D"}}>{loginError}</div>}

          <button onClick={handleAdminLogin} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#EF4444",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Login as Admin</button>
          
          <p style={{color:"#64748B",fontSize:10,margin:"12px 0 0",textAlign:"center"}}>✓ Full system access<br/>✓ Manage team & tasks</p>
        </div>
      </div>
    </div>
  );

  /* ── MAIN DASHBOARD ── */
  return (
    <div style={{minHeight:"100vh",background:"#0F172A"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#1E293B 0%,#0F172A 100%)",borderBottom:"1px solid #1E293B",padding:"14px 24px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <span style={{fontSize:11,letterSpacing:3,color:"#64748B",fontFamily:"'Space Mono',monospace",textTransform:"uppercase"}}>SEBI COMPLIANCE</span>

          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,background:isAdmin?"#312E81":"#1E3A5F",color:isAdmin?"#A5B4FC":"#7DD3FC",border:"1px solid "+(isAdmin?"#4338CA":"#0369A1")}}>{isAdmin?"ADMIN":"TEAM"}: {loginName}</span>

            {isAdmin && <button onClick={()=>setShowLog(!showLog)} style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,background:"#1E293B",color:"#94A3B8",border:"1px solid #334155",cursor:"pointer"}}>📜 Activity Log</button>}
            {isAdmin && <button onClick={()=>{const dataStr = JSON.stringify({tasks,statuses,activityLog,teamMembers,userCredentials,adminPassword});const blob = new Blob([dataStr], {type: 'application/json'});const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = `compliance-data-${new Date().toISOString().split('T')[0]}.json`;a.click();alert('✅ Data saved! Send this file to other users.');}} style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,background:"#22C55E",color:"#000",border:"1px solid #22C55E",cursor:"pointer"}}>📥 Export</button>}
            {isAdmin && <button onClick={()=>{const input = document.createElement('input');input.type = 'file';input.accept = '.json';input.onchange = (e) => {const file = e.target.files[0];const reader = new FileReader();reader.onload = (event) => {try {const imported = JSON.parse(event.target.result);if (imported.tasks && imported.teamMembers) {setTasks(imported.tasks);setStatuses(imported.statuses || {});setActivityLog(imported.activityLog || []);setTeamMembers(imported.teamMembers);setUserCredentials(imported.userCredentials || {});if (imported.adminPassword) setAdminPassword(imported.adminPassword);persist(imported.tasks, imported.statuses, imported.activityLog, imported.teamMembers, imported.userCredentials, imported.adminPassword);alert('✅ Data loaded successfully!');} else {alert('❌ Invalid file format');}} catch(err) {alert('❌ Error: ' + err.message);}};reader.readAsText(file);};input.click();}} style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:600,background:"#3B82F6",color:"#fff",border:"1px solid #3B82F6",cursor:"pointer"}}>📤 Import</button>}

        {/* STATS */}

            <div key={s.l} style={{background:s.b,borderRadius:14,padding:"14px 16px",border:"1px solid "+s.c+"22"}}>
              <div style={{fontSize:26,fontWeight:700,color:s.c,fontFamily:"'Space Mono',monospace"}}>{s.v}</div>
              <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{s.l}</div>

        <div style={{background:"#1E293B",borderRadius:12,padding:14,marginBottom:20,border:"1px solid #334155"}}>

          <div style={{height:7,background:"#0F172A",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#22C55E,#4ADE80)",borderRadius:4,transition:"width 0.5s"}}/>

        </div>

        {/* CATEGORY PILLS */}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>

            <button key={cat} onClick={()=>setSelectedCat(selectedCat===cat?"All":cat)} style={{padding:"7px 12px",borderRadius:8,fontSize:11,fontWeight:600,background:selectedCat===cat?cc.badge+"22":"#1E293B",color:selectedCat===cat?cc.badge:"#94A3B8",border:"1px solid "+(selectedCat===cat?cc.badge:"#334155"),cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
              {cat} <span style={{fontSize:9,padding:"1px 5px",borderRadius:4,background:p===100?"#052E16":"#0F172A",color:p===100?"#22C55E":"#64748B"}}>{cs.done}/{cs.total}</span>
            </button>);
          })}
        </div>

        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>

          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:13,outline:"none",cursor:"pointer"}}>
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
            <option value="overdue">Overdue</option>
          </select>
          <input type="text" placeholder="From DD.MM.YYYY" value={dateRangeStart} onChange={e=>setDateRangeStart(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:12,outline:"none",width:130}}/>
          <input type="text" placeholder="To DD.MM.YYYY" value={dateRangeEnd} onChange={e=>setDateRangeEnd(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:12,outline:"none",width:130}}/>
          {(dateRangeStart || dateRangeEnd) && <button onClick={()=>{setDateRangeStart(""); setDateRangeEnd("");}} style={{padding:"9px 12px",borderRadius:10,border:"1px solid #334155",background:"#1E293B",color:"#94A3B8",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>✕ Clear dates</button>}
          {isAdmin && <button onClick={()=>setShowBulkImport(true)} style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#8B5CF6",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>📥 Bulk Import</button>}
          {isAdmin && <button onClick={()=>setShowAddModal(true)} style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#6366F1",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>+ Add Task</button>}
          {isAdmin && <button onClick={resetAll} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #7F1D1D",background:"#450A0A",color:"#FCA5A5",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>Reset All</button>}
        </div>

        {/* TEAM MEMBERS MANAGER */}
        {showTeamManager && isAdmin && (
          <div className="fade-in" style={{background:"#1E293B",borderRadius:14,padding:18,marginBottom:20,border:"1px solid #334155"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:700}}>👥 Team Members</h3>
              <button onClick={()=>setShowTeamManager(false)} style={{background:"none",border:"none",color:"#64748B",cursor:"pointer",fontSize:16}}>✕</button>
            </div>
            
            <div style={{background:"#0F172A",borderRadius:10,padding:12,marginBottom:14,border:"1px solid #334155"}}>
              <div style={{fontSize:11,color:"#94A3B8",marginBottom:10,fontWeight:600}}>✨ ADD NEW TEAM MEMBER</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8,alignItems:"flex-end"}}>
                <div>
                  <label style={{display:"block",fontSize:10,color:"#64748B",marginBottom:4}}>Name</label>
                  <input type="text" placeholder="Username" value={newTeamMemberName} onChange={e=>setNewTeamMemberName(e.target.value)} onKeyDown={e=>e.key==="Enter" && addTeamMember()}
                    style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:11,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <div>
                  <label style={{display:"block",fontSize:10,color:"#64748B",marginBottom:4}}>Password</label>
                  <input type="password" placeholder="Set password" value={newTeamMemberPassword} onChange={e=>setNewTeamMemberPassword(e.target.value)} onKeyDown={e=>e.key==="Enter" && addTeamMember()}
                    style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #334155",background:"#1E293B",color:"#F8FAFC",fontSize:11,outline:"none",boxSizing:"border-box"}}/>
                </div>
                <button onClick={addTeamMember} disabled={!newTeamMemberName.trim() || !newTeamMemberPassword.trim()} style={{padding:"7px 14px",borderRadius:6,background:(!newTeamMemberName.trim() || !newTeamMemberPassword.trim())?"#334155":"#6366F1",color:"#fff",border:"none",fontSize:11,fontWeight:600,cursor:(!newTeamMemberName.trim() || !newTeamMemberPassword.trim())?"not-allowed":"pointer",transition:"background 0.2s"}}>Add Member</button>

            </div>

            {teamMembers.length === 0 ? (

            ) : (
              <div>
                <div style={{fontSize:11,color:"#94A3B8",marginBottom:8,fontWeight:600}}>REGISTERED MEMBERS ({teamMembers.length})</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {teamMembers.map(member => (
                    <div key={member} style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"10px 12px",display:"flex",alignItems:"center",gap:10,fontSize:12}}>
                      <div style={{flex:1}}>
                        <div style={{color:"#E2E8F0",fontWeight:500}}>{member}</div>
                        <div style={{color:"#64748B",fontSize:10}}>🔒 Password protected</div>
                      </div>
                      <button onClick={()=>removeTeamMember(member)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:14,padding:0,transition:"opacity 0.2s"}}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* SECURITY SETTINGS & DATA SYNC */}
        {isAdmin && (
          <div className="fade-in" style={{background:"#1E293B",borderRadius:14,padding:18,marginBottom:20,border:"1px solid #334155"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:700}}>🔐 Security Settings & Data Sync</h3>
            </div>
            
            <div style={{background:"#0F172A",borderRadius:10,padding:12,marginBottom:14,border:"1px solid #334155"}}>

                  <input type="password" placeholder="Enter new admin password" value={newAdminPassword} onChange={e=>setNewAdminPassword(e.target.value)} onKeyDown={e=>e.key==="Enter" && updateAdminPassword()}

                </div>
                <button onClick={updateAdminPassword} disabled={!newAdminPassword.trim()} style={{padding:"7px 14px",borderRadius:6,background:!newAdminPassword.trim()?"#334155":"#EF4444",color:"#fff",border:"none",fontSize:11,fontWeight:600,cursor:!newAdminPassword.trim()?"not-allowed":"pointer",transition:"background 0.2s"}}>Update</button>
              </div>
              <div style={{fontSize:10,color:"#FCA5A5",marginTop:8}}>💡 Your current admin password is: <span style={{fontFamily:"'Space Mono',monospace",fontWeight:600}}>admin123</span></div>
            </div>

            <div style={{background:"#0F172A",borderRadius:10,padding:12,border:"1px solid #334155"}}>
              <div style={{fontSize:11,color:"#22C55E",marginBottom:10,fontWeight:600}}>💾 EXPORT/IMPORT DATA (For Manual Sync)</div>
              <p style={{fontSize:10,color:"#94A3B8",margin:"0 0 10px"}}>Share data between devices manually by exporting and importing</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <button onClick={()=>{
                  const dataStr = JSON.stringify({tasks,statuses,activityLog,teamMembers,userCredentials,adminPassword});
                  const blob = new Blob([dataStr], {type: 'application/json'});
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url;
                  a.download = `compliance-data-${new Date().toISOString().split('T')[0]}.json`;
                  a.click();
                  alert('✅ Data exported! Send this file to other users.');
                }} style={{padding:"8px 12px",borderRadius:6,background:"#22C55E",color:"#000",border:"none",fontSize:11,fontWeight:600,cursor:"pointer"}}>📥 Export Data</button>
                
                <button onClick={()=>{
                  const input = document.createElement('input');
                  input.type = 'file';
                  input.accept = '.json';
                  input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (event) => {
                      try {
                        const imported = JSON.parse(event.target.result);
                        if (imported.tasks && imported.teamMembers) {
                          setTasks(imported.tasks);
                          setStatuses(imported.statuses || {});
                          setActivityLog(imported.activityLog || []);
                          setTeamMembers(imported.teamMembers);
                          setUserCredentials(imported.userCredentials || {});
                          if (imported.adminPassword) setAdminPassword(imported.adminPassword);
                          persist(imported.tasks, imported.statuses, imported.activityLog, imported.teamMembers, imported.userCredentials, imported.adminPassword);
                          alert('✅ Data imported successfully!');
                        } else {
                          alert('❌ Invalid file format');
                        }
                      } catch(err) {
                        alert('❌ Error importing file: ' + err.message);
                      }
                    };
                    reader.readAsText(file);
                  };
                  input.click();
                }} style={{padding:"8px 12px",borderRadius:6,background:"#3B82F6",color:"#fff",border:"none",fontSize:11,fontWeight:600,cursor:"pointer"}}>📤 Import Data</button>
              </div>
            </div>

          ) : filtered.map((t,idx)=>{
            const s = statuses[t.id]?.status || "pending";
            const sc = STATUS_CFG[s];
            const cc = CAT_COLORS[t.category];
            return (
              <div key={t.id} className="task-row" style={{background:"#1E293B11",borderRadius:10,padding:"12px 16px",border:"1px solid "+(s==="done"?"#22C55E22":"#334155"),display:"flex",alignItems:"center",gap:12,transition:"all 0.15s",opacity:s==="done"?0.65:1,animationDelay:idx*15+"ms",cursor:"default"}}>

                    {t.type==="bulk" && <span style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:"#5B21B6",color:"#D8B4FE"}}>BULK</span>}
                  </div>
                  <div style={{fontSize:12.5,color:s==="done"?"#64748B":"#E2E8F0",textDecoration:s==="done"?"line-through":"none",lineHeight:1.4}}>{t.task}</div>
                  {statuses[t.id]?.updatedBy && <div style={{fontSize:10,color:"#475569",marginTop:3}}>Updated by <strong>{statuses[t.id].updatedBy}</strong> • {new Date(statuses[t.id].updatedAt).toLocaleString()}</div>}
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  {Object.entries(STATUS_CFG).map(([key,val])=>(
                    <button key={key} className="btn-status" onClick={()=>updateStatus(t.id,key)} style={{padding:"4px 9px",borderRadius:5,fontSize:10,fontWeight:600,background:s===key?val.color+"22":"transparent",color:s===key?val.color:"#475569",border:"1px solid "+(s===key?val.color:"#33415566"),cursor:"pointer",transition:"all 0.12s",whiteSpace:"nowrap"}}>{val.label}</button>
                  ))}
                  {isAdmin && (<>
                    <button onClick={()=>{setEditingTaskId(t.id);setEditingTaskAssignedTo(t.assignedTo||"all");}} style={{padding:"4px 8px",borderRadius:5,fontSize:10,background:"transparent",color:"#7DD3FC",border:"1px solid #0369A144",cursor:"pointer",whiteSpace:"nowrap"}} title="Edit task">✎ Assign</button>
                    <button onClick={()=>setShowDeleteConfirm(t.id)} style={{padding:"4px 7px",borderRadius:5,fontSize:10,background:"transparent",color:"#7F1D1D",border:"1px solid #7F1D1D44",cursor:"pointer"}} title="Remove task">✕</button>
                  </>)}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{textAlign:"center",padding:"20px 0",color:"#334155",fontSize:11}}>Showing {filtered.length} of {tasks.length} tasks</div>
      </div>

      {/* ADD TASK MODAL */}
      {showAddModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowAddModal(false)} style={{position:"fixed",inset:0,background:"#000000aa",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div className="slide-up" style={{background:"#1E293B",borderRadius:20,padding:28,maxWidth:480,width:"100%",border:"1px solid #334155"}}>
            <h2 style={{margin:"0 0 20px",fontSize:19,fontWeight:700}}>Add New Task</h2>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:5}}>Category</label>
              <select value={newTask.category} onChange={e=>setNewTask({...newTask,category:e.target.value})} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13}}>
                {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:5}}>Task Description</label>
              <textarea value={newTask.task} onChange={e=>setNewTask({...newTask,task:e.target.value})} rows={3} placeholder="Enter compliance task description..." style={{width:"100%",padding:"9px 12px",borderRadius:10,boxSizing:"border-box",border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13,resize:"vertical",fontFamily:"'DM Sans',sans-serif"}}/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:5}}>Due Date</label>
              <input value={newTask.due} onChange={e=>setNewTask({...newTask,due:e.target.value})} placeholder="e.g. 30.04.2026" style={{width:"100%",padding:"9px 12px",borderRadius:10,boxSizing:"border-box",border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13}}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:5}}>Assign To</label>
              <select value={newTask.assignedTo} onChange={e=>setNewTask({...newTask,assignedTo:e.target.value})} style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13}}>
                <option value="all">All Team Members</option>
                {teamMembers.map(tm => <option key={tm} value={tm}>{tm}</option>)}
              </select>
              {teamMembers.length === 0 && <div style={{fontSize:10,color:"#64748B",marginTop:4}}>💡 No team members added yet. Add team members in dashboard settings.</div>}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowAddModal(false)} style={{padding:"9px 18px",borderRadius:10,border:"1px solid #334155",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:13}}>Cancel</button>
              <button onClick={addTask} style={{padding:"9px 22px",borderRadius:10,border:"none",background:"#6366F1",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Add Task</button>
            </div>
          </div>
        </div>
      )}

      {/* BULK IMPORT MODAL */}
      {showBulkImport && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowBulkImport(false)} style={{position:"fixed",inset:0,background:"#000000aa",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div className="slide-up" style={{background:"#1E293B",borderRadius:20,padding:28,maxWidth:700,width:"100%",border:"1px solid #334155",maxHeight:"90vh",overflowY:"auto"}}>
            <h2 style={{margin:"0 0 6px",fontSize:19,fontWeight:700}}>📥 Bulk Import Tasks</h2>
            <p style={{fontSize:11,color:"#64748B",margin:"0 0 12px"}}>Import multiple tasks at once using CSV or JSON format</p>
            
            <div style={{background:"#0F172A",borderRadius:10,padding:12,marginBottom:14,border:"1px solid #334155"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#E2E8F0",marginBottom:8}}>📋 Format Guide:</div>
              <div style={{fontSize:10,color:"#94A3B8",lineHeight:1.6,fontFamily:"'Space Mono',monospace"}}>
                <div style={{marginBottom:8}}><strong style={{color:"#CBD5E1"}}>CSV Format:</strong> category,task,due,assignedTo</div>
                <div style={{background:"#1E293B",padding:8,borderRadius:6,marginBottom:8,border:"1px solid #334155"}}>
                  <div style={{color:"#A3E635"}}>PMS,Monthly report submission,30.04.2026,all</div>
                  <div style={{color:"#A3E635"}}>AIF,NAV Disclosure,30.04.2026,john</div>
                  <div style={{color:"#A3E635"}}>Stock Broking,Surveillance Report,15.04.2026,sarah</div>
                </div>
                
                <div style={{marginBottom:8}}><strong style={{color:"#CBD5E1"}}>JSON Format (one per line):</strong></div>
                <div style={{background:"#1E293B",padding:8,borderRadius:6,marginBottom:8,border:"1px solid #334155"}}>
                  <div style={{color:"#7DD3FC",fontSize:9}}>{"{"}"category":"PMS","task":"Monthly report","due":"30.04.2026","assignedTo":"all"{"}"}</div>
                  <div style={{color:"#7DD3FC",fontSize:9}}>{"{"}"category":"AIF","task":"NAV Disclosure","due":"30.04.2026","assignedTo":"john"{"}"}</div>
                </div>
                
                <div><strong style={{color:"#CBD5E1"}}>assignedTo Field:</strong></div>
                <div style={{marginLeft:8}}>
                  <div style={{color:"#A3E635"}}>✓ "all" = Visible to all team members</div>
                  <div style={{color:"#A3E635"}}>✓ "username" = Assign to specific person (john, sarah, mike, etc.)</div>
                </div>
              </div>
            </div>

            <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:6,fontWeight:600}}>Paste Your Tasks Below</label>
            <textarea value={bulkImportText} onChange={e=>{setBulkImportText(e.target.value); setBulkImportError("");}} placeholder={`PMS,Disclosure of Investor Charter,07.04.2026,all\nAIF,NAV Disclosure,30.04.2026,john\nStock Broking,Surveillance Report,15.04.2026,sarah`} rows={8} style={{width:"100%",padding:"12px",borderRadius:10,boxSizing:"border-box",border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:11,resize:"vertical",fontFamily:"'Space Mono',monospace",marginBottom:10}}/>
            {bulkImportError && <div style={{background:"#450A0A",color:"#FCA5A5",padding:10,borderRadius:8,fontSize:11,marginBottom:10,border:"1px solid #7F1D1D",whiteSpace:"pre-wrap"}}>{bulkImportError}</div>}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>{setShowBulkImport(false); setBulkImportError("");}} style={{padding:"9px 18px",borderRadius:10,border:"1px solid #334155",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:13}}>Cancel</button>
              <button onClick={handleBulkImport} style={{padding:"9px 22px",borderRadius:10,border:"none",background:"#8B5CF6",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Import Tasks</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT TASK MODAL - REASSIGN TO TEAM MEMBER */}
      {editingTaskId && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditingTaskId(null)} style={{position:"fixed",inset:0,background:"#000000aa",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div className="slide-up" style={{background:"#1E293B",borderRadius:20,padding:28,maxWidth:420,width:"100%",border:"1px solid #334155"}}>
            <h2 style={{margin:"0 0 6px",fontSize:19,fontWeight:700}}>👤 Assign Team Member</h2>
            <p style={{fontSize:11,color:"#64748B",margin:"0 0 16px"}}>Reassign this task to a team member</p>
            
            <div style={{background:"#0F172A",borderRadius:10,padding:12,marginBottom:16,border:"1px solid #334155"}}>
              <div style={{fontSize:11,color:"#CBD5E1",marginBottom:8}}><strong>Current Task:</strong></div>
              <div style={{fontSize:12,color:"#E2E8F0",lineHeight:1.4}}>{tasks.find(t=>t.id===editingTaskId)?.task}</div>
            </div>

            <div style={{marginBottom:20}}>
              <label style={{display:"block",fontSize:11,color:"#94A3B8",marginBottom:6,fontWeight:600}}>Assign To:</label>
              <select value={editingTaskAssignedTo} onChange={e=>setEditingTaskAssignedTo(e.target.value)} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1px solid #334155",background:"#0F172A",color:"#F8FAFC",fontSize:13,fontWeight:500}}>
                <option value="all">👥 All Team Members (Visible to all)</option>
                {teamMembers.map(tm => <option key={tm} value={tm}>👤 {tm}</option>)}
              </select>
              {teamMembers.length === 0 && <div style={{fontSize:10,color:"#64748B",marginTop:6}}>💡 No team members added yet. Add team members in the Team Members section.</div>}
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setEditingTaskId(null)} style={{padding:"10px 18px",borderRadius:10,border:"1px solid #334155",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:13}}>Cancel</button>
              <button onClick={()=>updateTaskAssignment(editingTaskId, editingTaskAssignedTo)} style={{padding:"10px 22px",borderRadius:10,border:"none",background:"#7DD3FC",color:"#0F172A",cursor:"pointer",fontSize:13,fontWeight:600}}>Assign</button>
            </div>
          </div>
        </div>
      )}

      {/* DELETE CONFIRM */}
      {showDeleteConfirm && (
        <div className="modal-overlay" style={{position:"fixed",inset:0,background:"#000000aa",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div className="slide-up" style={{background:"#1E293B",borderRadius:16,padding:24,maxWidth:400,width:"100%",border:"1px solid #7F1D1D44"}}>
            <h3 style={{margin:"0 0 10px",fontSize:16,color:"#FCA5A5"}}>Remove Task?</h3>
            <p style={{fontSize:12,color:"#94A3B8",margin:"0 0 18px",lineHeight:1.5}}>{tasks.find(t=>t.id===showDeleteConfirm)?.task}</p>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowDeleteConfirm(null)} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #334155",background:"transparent",color:"#94A3B8",cursor:"pointer",fontSize:12}}>Cancel</button>
              <button onClick={()=>deleteTask(showDeleteConfirm)} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#DC2626",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600}}>Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
